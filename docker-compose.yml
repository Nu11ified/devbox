services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-patchwork}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-patchwork}
      POSTGRES_DB: ${POSTGRES_DB:-patchwork}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - patchwork

  server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - "${SERVER_PORT:-3001}:3001"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - patchwork-data:/data/patchwork
    # env_file passes values literally (no $ interpolation)
    # Use this for credentials that may contain special characters
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-patchwork}:${POSTGRES_PASSWORD:-patchwork}@postgres:5432/${POSTGRES_DB:-patchwork}
      DBOS_SYSTEM_DATABASE_URL: postgresql://${POSTGRES_USER:-patchwork}:${POSTGRES_PASSWORD:-patchwork}@postgres:5432/${POSTGRES_DB:-patchwork}
      FILE_STORE_PATH: /data/patchwork
    networks:
      - patchwork

  ui:
    build:
      context: .
      dockerfile: packages/ui/Dockerfile
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "${UI_PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      API_SERVER_URL: ${API_SERVER_URL:-http://server:3001}
    networks:
      - patchwork

networks:
  patchwork:
    driver: bridge

volumes:
  pgdata:
  patchwork-data:
