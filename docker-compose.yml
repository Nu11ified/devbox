services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-patchwork}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-patchwork}
      POSTGRES_DB: ${POSTGRES_DB:-patchwork}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - patchwork
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 256M

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data
    networks:
      - patchwork
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 64M

  server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    ports:
      - "${SERVER_PORT:-3001}:3001"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - patchwork-data:/data/patchwork
      - ${CLAUDE_CONFIG_DIR:-/home/nullify/.claude}:/home/bun/.claude
    # env_file passes values literally (no $ interpolation)
    # Use this for credentials that may contain special characters
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-patchwork}:${POSTGRES_PASSWORD:-patchwork}@postgres:5432/${POSTGRES_DB:-patchwork}
      DBOS_SYSTEM_DATABASE_URL: postgresql://${POSTGRES_USER:-patchwork}:${POSTGRES_PASSWORD:-patchwork}@postgres:5432/${POSTGRES_DB:-patchwork}
      FILE_STORE_PATH: /data/patchwork
      REDIS_URL: redis://redis:6379
      CLAUDE_CONFIG_DIR: /home/bun/.claude
    dns:
      - 8.8.8.8
      - 1.1.1.1
    networks:
      - patchwork
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '2.0'
        reservations:
          memory: 512M

  ui:
    build:
      context: .
      dockerfile: packages/ui/Dockerfile
      args:
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-}
    restart: unless-stopped
    depends_on:
      - server
      - postgres
    ports:
      - "${UI_PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      API_SERVER_URL: ${API_SERVER_URL:-http://server:3001}
      NEXT_PUBLIC_SERVER_URL: ${NEXT_PUBLIC_SERVER_URL:-}
      DATABASE_URL: postgresql://${POSTGRES_USER:-patchwork}:${POSTGRES_PASSWORD:-patchwork}@postgres:5432/${POSTGRES_DB:-patchwork}
    networks:
      - patchwork
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 256M

networks:
  patchwork:
    driver: bridge

volumes:
  pgdata:
  patchwork-data:
  redisdata:
